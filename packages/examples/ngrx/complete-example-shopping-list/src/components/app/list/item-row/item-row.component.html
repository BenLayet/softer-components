@if (v$ | async; as v) {
  <div
    class="clickable horizontal"
    style="border: 1px dotted grey; min-height: 1em; justify-content: space-between; padding: 0 4px"
  >
    <div
      class="horizontal"
      style="flex-grow: 1; justify-content: flex-start"
    >
      {{ v.name }}
      <span style="margin-left: 1em; font-size: 0.7em">
        x{{ v.quantity }}
      </span>
    </div>
    <div class="horizontal">
      <button
        aria-label="Decrement value"
        (click)="e.decrementRequested()"
      >
        -
      </button>
      <button
        aria-label="Increment value"
        (click)="e.incrementRequested()"
      >
        +
      </button>
      <button (click)="e.removeItemRequested()">X</button>
    </div>
  </div>
}
