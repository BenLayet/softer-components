@if (v$ | async; as v) {
  <div class="menu-item">
    @if (v.isAnonymous) {
      <button
        class="link"
        (click)="e.goToSignInFormRequested()"
        title="Sign in to share your lists"
      >
        🔓 Sign in
      </button>
    }
    @if (v.isAuthenticated) {
      Hi <span style='{ "text-transform": "capitalize" }'>{{ v.username }}</span
      >!
      <button
        class="link"
        (click)="e.signOutRequested()"
        title="Sign out and return to anonymous mode"
      >
        sign out
      </button>
    }
  </div>
}
